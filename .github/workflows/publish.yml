name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: https://registry.npmjs.org
          cache: 'npm'

      # OIDC trusted publishing requires npm >= 11.5.1 (Node lts ships npm 10)
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # No NODE_AUTH_TOKEN: npm authenticates via OIDC trusted publishing.
      # A token here would override OIDC and force token auth.
      - name: Publish with provenance
        run: npm publish --provenance --access public --ignore-scripts
